name: Bug Report
description: Report something that isn't working correctly
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please search existing issues and PRs first, then review `CONTRIBUTING.md` before opening a fix.
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of what the bug is.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to Reproduce
      description: |
        Steps to reproduce the behavior:
        1. Go to '...'
        2. Click on '...'
        3. See error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected vs Actual Behavior
      description: What you expected to happen vs what actually happened
    validations:
      required: true
  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots
      description: If applicable, add screenshots to help explain your problem
  - type: input
    id: environment
    attributes:
      label: Environment
      description: OS, browser, version numbers, etc.
    validations:
      required: true
  - type: textarea
    id: acceptance-criteria
    attributes:
      label: Acceptance Criteria
      description: What should be true when this is fixed?
      placeholder: |
        - [ ] ...
        - [ ] ...
  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Add any other context about the problem here
  - type: checkboxes
    id: contribution-flow
    attributes:
      label: Contribution Flow
      options:
        - label: I searched existing issues and PRs for duplicates.
        - label: I reviewed `CONTRIBUTING.md`.
        - label: I will follow the Stellar Wave flow for bounty-related work, if applicable.
