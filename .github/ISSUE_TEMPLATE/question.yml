name: Question
description: Ask a question or seek clarification
title: "[Question]: "
labels: ["question"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for asking. For implementation work, please review `CONTRIBUTING.md` and link the related issue from your PR.
  - type: textarea
    id: question
    attributes:
      label: Your Question
      description: What would you like to know or clarify?
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Context
      description: Provide any relevant context for your question
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version
      description: If applicable, what version are you using?
